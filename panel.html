<!DOCTYPE html>
<html>
<head>
  <title>CIVITAS PANEL</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    #map {
      height: 100vh;
    }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      z-index: 1000;
    }
  </style>
</head>
<body>

<div class="panel">
  <h2>CIVITAS PANEL</h2>
  <button onclick="cargar()">Actualizar</button>
</div>

<div id="map"></div>

<script>
  const API = "http://192.168.0.108:8000";

  const map = L.map('map').setView([19.83, -90.55], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'CIVITAS'
  }).addTo(map);

  let markers = [];

  async function cargar() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const res = await fetch(`${API}/reportes`);
    const data = await res.json();

    data.forEach(r => {
      const marker = L.marker([r.lat, r.lng]).addTo(map);

      marker.bindPopup(`
        <b>${r.descripcion}</b><br>
        Usuario: ${r.usuario}<br>
        Categoría: ${r.categoria}<br>
        ${r.imagen ? `<img src="data:image/jpeg;base64,${r.imagen}" width="150"/>` : ""}
      `);

      markers.push(marker);
    });
  }

  cargar();
</script>

</body>
</html>
